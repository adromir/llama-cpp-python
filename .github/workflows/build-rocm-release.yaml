name: Build ROCm Wheels & Release

# Trigger: push of any tag (e.g. v0.3.2)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Global environment – ROCm version used in both Linux and Windows jobs.
# Bump these two variables to update the ROCm version across all jobs.
# ---------------------------------------------------------------------------
env:
  ROCM_VERSION: "7.2.0"          # Full ROCm version string (used on Linux)
  ROCM_WIN_VERSION: "7.11"       # HIP SDK version for Windows (AMD Software PRO 26.Q1)

jobs:
  # ============================================================
  # Linux ROCm wheel build
  # ============================================================
  build_linux_rocm:
    name: Linux ROCm – Python ${{ matrix.python }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        # Python versions 3.9 – 3.14
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      # ── Checkout (with submodules for llama.cpp) ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Install ROCm via the official amdgpu-install script ──────────────
      # AMD no longer exposes a plain apt repo for ROCm 7.x.
      # The recommended method is the amdgpu-install helper package.
      # Docs: https://rocm.docs.amd.com/projects/install-on-linux/en/latest/
      - name: Install ROCm ${{ env.ROCM_VERSION }}
        run: |
          set -euo pipefail

          # Prerequisites required by amdgpu-install
          sudo apt-get update -y
          sudo apt-get install -y python3-setuptools python3-wheel wget

          # Download the amdgpu-install helper deb for Ubuntu 24.04 (noble)
          # Version 7.2.1 installer corresponds to ROCm 7.2
          INSTALLER_DEB="amdgpu-install_7.2.1.70201-1_all.deb"
          wget -q "https://repo.radeon.com/amdgpu-install/7.2.1/ubuntu/noble/${INSTALLER_DEB}"
          sudo apt-get install -y "./${INSTALLER_DEB}"
          rm -f "./${INSTALLER_DEB}"

          # Install ROCm stack (no GUI / graphics needed in CI, no kernel driver)
          sudo amdgpu-install -y --usecase=rocm --no-dkms

          # Explicitly install hipBLAS and rocBLAS development packages.
          # These provide the headers and CMake modules (e.g. hipblas-config.cmake)
          # that are required for compilation – they may not be included in the
          # base 'rocm' usecase.
          sudo apt-get install -y \
            libhipblas-dev \
            librocblas-dev \
            hip-dev \
            rocm-cmake

          # Ensure ROCm tools are in PATH for subsequent steps
          echo "/opt/rocm/bin" >> "$GITHUB_PATH"
          echo "ROCM_PATH=/opt/rocm" >> "$GITHUB_ENV"
          echo "HIP_PATH=/opt/rocm"  >> "$GITHUB_ENV"
        shell: bash

      # ── Diagnose ROCm installation before building ────────────────────────
      # Prints key paths so failures are immediately diagnosable in the log.
      - name: Diagnose ROCm installation
        run: |
          echo "=== ROCm version ==="
          cat /opt/rocm/.info/version 2>/dev/null || echo "(version file not found)"
          echo "=== HIP compilers ==="
          for bin in amdclang amdclang++ hipcc; do
            echo -n "  $bin: "; which $bin 2>/dev/null || echo "NOT FOUND"
          done
          echo "=== hipBLAS library ==="
          find /opt/rocm -name 'libhipblas*' 2>/dev/null | head -5 || echo "NOT FOUND"
          echo "=== HIP CMake modules ==="
          find /opt/rocm -name 'hip-config.cmake' -o -name 'hipblas-config.cmake' 2>/dev/null | head -10 || echo "NOT FOUND"
        shell: bash

      # ── Set up the requested Python version ──────────────────────────────
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # ── Build the wheel ──────────────────────────────────────────────────
      # CMAKE_ARGS enables hipBLAS (ROCm) support.
      # CMAKE_HIP_COMPILER: CMake 3.21+ treats HIP as first-class language.
      # CMAKE_PREFIX_PATH: base path so find_package modules can be located.
      # hip_DIR / hipblas_DIR / rocblas_DIR: explicit cmake config locations,
      #   needed because CMAKE_PREFIX_PATH alone sometimes isn't sufficient when
      #   ROCm was installed via amdgpu-install rather than a system package.
      # AMDGPU_TARGETS selects GPU ISAs:
      #   gfx1201/gfx1200 = RDNA4, gfx1100 = RDNA3, gfx1030 = RDNA2,
      #   gfx906 = Vega20 (MI50), gfx908 = Arcturus (MI100)
      - name: Build ROCm wheel
        env:
          CMAKE_ARGS: >-
            -DGGML_HIP=ON
            -DGGML_NATIVE=OFF
            -DCMAKE_C_COMPILER=/opt/rocm/bin/amdclang
            -DCMAKE_CXX_COMPILER=/opt/rocm/bin/amdclang++
            -DCMAKE_HIP_COMPILER=/opt/rocm/bin/amdclang++
            -DCMAKE_PREFIX_PATH=/opt/rocm
            -Dhip_DIR=/opt/rocm/lib/cmake/hip
            -Dhipblas_DIR=/opt/rocm/lib/cmake/hipblas
            -Drocblas_DIR=/opt/rocm/lib/cmake/rocblas
            -DAMDGPU_TARGETS=gfx1201;gfx1200;gfx1100;gfx1030;gfx906;gfx908
          FORCE_CMAKE: "1"
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build wheel setuptools
          python -m pip wheel . \
            --no-deps \
            --wheel-dir dist \
            --verbose
        shell: bash

      # ── Verify ROCm build (informational) ────────────────────────────
      # Strategy:
      #  1. Check if libggml-hip.so is present in the wheel (the separate HIP
      #     backend shared library compiled when GGML_HIPBLAS=ON).
      #  2. As a fallback, scan ALL .so files in the wheel for hipblas/rocblas
      #     in their NEEDED sections. On older llama.cpp the HIP backend may
      #     be linked directly into libllama.so rather than shipped separately.
      # This step NEVER fails the build – it only prints diagnostic info so
      # that ROCm issues are immediately visible in the Actions log.
      - name: Verify ROCm (HIP backend) was compiled
        run: |
          set -uo pipefail
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Inspecting: $WHEEL"

          echo "--- All shared libraries in wheel ---"
          python -m zipfile -l "$WHEEL" | grep '\.so' || true

          # Check 1: separate HIP backend library
          if python -m zipfile -l "$WHEEL" | grep -qi 'libggml-hip\|ggml-rocm\|ggml-hipblas'; then
            echo "✅ ROCm verified (check 1): HIP backend library found in wheel."
            exit 0
          fi

          # Check 2: any .so in the wheel links against hipblas/rocblas
          TMPDIR=$(mktemp -d)
          python -m zipfile -e "$WHEEL" "$TMPDIR" 2>/dev/null
          HIP_FOUND=0
          for so in $(find "$TMPDIR" -name '*.so' 2>/dev/null); do
            if readelf -d "$so" 2>/dev/null | grep -qi 'hipblas\|rocblas'; then
              echo "✅ ROCm verified (check 2): $(basename $so) links against hipblas/rocblas."
              HIP_FOUND=1
              break
            fi
          done
          rm -rf "$TMPDIR"

          if [ "$HIP_FOUND" -eq 0 ]; then
            echo "⚠️  WARNING: No ROCm indicators found in wheel."
            echo "   libggml-hip.so absent AND no hipblas NEEDED entries detected."
            echo "   The wheel may be CPU-only. Check the cmake configure output above."
          fi
        shell: bash

      # ── Fix wheel tags so pip accepts them as linux_x86_64 wheels ─────────
      # auditwheel is not used here because ROCm libraries are intentionally
      # kept external (they live in /opt/rocm on the target system).
      # We only rename the wheel to a portable manylinux tag.
      - name: Rename wheel to manylinux tag
        run: |
          set -euo pipefail
          python - <<'EOF'
          import glob, os, re
          wheels = glob.glob("dist/*.whl")
          for whl in wheels:
              base = os.path.basename(whl)
              new_base = re.sub(r"linux_x86_64", "manylinux2014_x86_64", base)
              if new_base != base:
                  new_path = os.path.join("dist", new_base)
                  os.rename(whl, new_path)
                  print(f"Renamed: {base} -> {new_base}")
              else:
                  print(f"No rename needed: {base}")
          EOF
        shell: bash

      # ── Upload wheel as build artifact ────────────────────────────────────
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rocm-py${{ matrix.python }}
          path: dist/*.whl

  # ============================================================
  # Windows ROCm wheel build
  # ============================================================
  build_windows_rocm:
    name: Windows ROCm – Python ${{ matrix.python }}
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Download & install the AMD HIP SDK for Windows ───────────────────
      # The HIP SDK ships as a self-extracting EXE. The -install flag runs
      # it silently. Default install path: C:\Program Files\AMD\ROCm\<ver>
      - name: Install AMD HIP SDK ${{ env.ROCM_WIN_VERSION }}
        run: |
          # AMD Software PRO Edition 26.Q1 – HIP SDK 7.11 for Windows 11 / Server 2022
          $hipSdkUrl = "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-26.Q1-Win11-For-HIP.exe"
          $outFile   = "$env:TEMP\amd-hip-sdk.exe"

          Write-Host "Downloading AMD HIP SDK ${{ env.ROCM_WIN_VERSION }} installer..."
          Invoke-WebRequest -Uri $hipSdkUrl -OutFile $outFile -UseBasicParsing

          Write-Host "Installing AMD HIP SDK (silent)..."
          Start-Process -FilePath $outFile -ArgumentList "-install" -Wait -NoNewWindow

          # AMD HIP SDK default install location – try version-specific path first,
          # then fall back to the newest directory found under C:\Program Files\AMD\ROCm.
          $hipInstallPath = "C:\Program Files\AMD\ROCm\7.11"
          if (-not (Test-Path $hipInstallPath)) {
            $hipInstallPath = (
              Get-ChildItem "C:\Program Files\AMD\ROCm" -ErrorAction SilentlyContinue |
              Sort-Object Name -Descending | Select-Object -First 1
            ).FullName
          }

          if (-not $hipInstallPath) {
            Write-Error "HIP SDK installation path not found!"
            exit 1
          }

          Write-Host "HIP SDK installed at: $hipInstallPath"
          "HIP_PATH=$hipInstallPath"  | Out-File -FilePath $env:GITHUB_ENV  -Append
          "ROCM_PATH=$hipInstallPath" | Out-File -FilePath $env:GITHUB_ENV  -Append
          "$hipInstallPath\bin"       | Out-File -FilePath $env:GITHUB_PATH -Append
        shell: pwsh

      # ── Set up the requested Python version ──────────────────────────────
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # ── Build the wheel ──────────────────────────────────────────────────
      # On Windows the HIP SDK ships clang.exe in %HIP_PATH%\bin.
      # CMAKE_HIP_COMPILER must be set at runtime (inside the run block)
      # because $env:HIP_PATH is only available after the install step sets it
      # via GITHUB_ENV – it cannot be referenced inside the YAML env: block.
      - name: Build ROCm wheel (Windows)
        env:
          CMAKE_ARGS: >-
            -DGGML_HIP=ON
            -DGGML_NATIVE=OFF
            -DAMDGPU_TARGETS=gfx1201;gfx1200;gfx1100;gfx1030;gfx906;gfx908
          CMAKE_GENERATOR: "Visual Studio 17 2022"
          FORCE_CMAKE: "1"
        run: |
          # Append the HIP compiler path now that HIP_PATH env var is available
          $env:CMAKE_ARGS += " -DCMAKE_HIP_COMPILER=`"$env:HIP_PATH\bin\clang.exe`""
          $env:CMAKE_ARGS += " -DCMAKE_PREFIX_PATH=`"$env:HIP_PATH`""
          Write-Host "CMAKE_ARGS: $env:CMAKE_ARGS"
          python -m pip install --upgrade pip build wheel setuptools
          python -m pip wheel . --no-deps --wheel-dir dist --verbose
        shell: pwsh

      # ── Upload wheel as build artifact ────────────────────────────────────
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-rocm-py${{ matrix.python }}
          path: dist\*.whl

  # ============================================================
  # Create GitHub Release and attach all wheels
  # ============================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build_linux_rocm, build_windows_rocm]

    steps:
      # ── Download every wheel artifact from both platform jobs ─────────────
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      # ── List what we are about to release ────────────────────────────────
      - name: List release assets
        run: ls -lh dist/

      # ── Publish GitHub Release ────────────────────────────────────────────
      # softprops/action-gh-release automatically creates (or updates) a
      # release for the tag that triggered this workflow.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
